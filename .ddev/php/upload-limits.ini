; PHP configuration for 100MB file uploads
; This file is loaded automatically by DDEV

[PHP]
; Maximum size of uploaded files (100MB)
upload_max_filesize = 100M

; Maximum size of POST data (should be >= upload_max_filesize)
post_max_size = 110M

; Maximum execution time for scripts (5 minutes for large uploads)
max_execution_time = 300

; Maximum input time (5 minutes)
max_input_time = 300

; Memory limit (256MB to handle large file processing)
memory_limit = 4G
